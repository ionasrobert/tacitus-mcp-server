name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run eval
      - run: npm run build

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test
      # Lean-tree invariant: a wasmtime feature must never pull cmake or the
      # zstd C library into the plugins tree (wasmtime's `cache` feature would;
      # its `runtime` cc shim is fine — same class as ring's, already shipped).
      - name: guard heavy C deps in tacitus-plugins
        run: |
          if cargo tree -p tacitus-plugins -e normal,build | grep -E ' (cmake|zstd)'; then
            echo "cmake/zstd dependency crept into tacitus-plugins" && exit 1
          fi
      # E2E: build the reference WASM guest and run the ignored test against it.
      - run: cargo build --release --target wasm32-unknown-unknown --manifest-path examples/plugins/hello-tacitus/Cargo.toml
      - run: cargo test -p tacitus-plugins --test example_guest -- --include-ignored
