# nginx vhost for the hosted Tacitus Sync relay (mirror of production).
# certbot adds the TLS blocks after: certbot --nginx -d sync.tacitus.md
server {
    listen 80;
    server_name sync.tacitus.md;

    location /healthz {
        proxy_pass http://127.0.0.1:8091;
    }

    location /ws {
        proxy_pass http://127.0.0.1:8091;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        client_max_body_size 16m;
    }
}
