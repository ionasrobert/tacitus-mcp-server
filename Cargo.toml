[workspace]
resolver = "2"
members = ["crates/*"]

[workspace.package]
version = "0.9.0"
edition = "2021"
license = "MIT"
repository = "https://github.com/ionasrobert/tacitus-mcp-server"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
sha2 = "0.10"
chrono = { version = "0.4", default-features = false, features = ["clock"] }
regex = "1"
# CRDT layer (tacitus-sync). yrs is exact-pinned: its API has churned between
# minors and the whole CRDT surface is wrapped in docs.rs/merge.rs.
yrs = "=0.27.3"
dissimilar = "1"

# The profile that 'dist' will build with
[profile.dist]
inherits = "release"
lto = "thin"
